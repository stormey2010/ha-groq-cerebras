analyze_image:
  name: Analyze Image
  description: Ask a Groq Image Recognition service to describe or answer questions about an image.
  target:
    entity:
      domain: camera
  fields:
    config_entry_id:
      name: Groq Account
      description: Groq account to use. Leave empty when only one Groq account is configured.
      required: false
      selector:
        config_entry:
          integration: groq
    service_id:
      name: Groq Service
      description: Image Recognition service name or ID from the Groq integration page. This is user-defined, so it cannot be shown as a fixed dropdown. Leave empty when the account has only one Image Recognition service.
      required: false
      example: Image Recognition
      selector:
        text:
    prompt:
      name: Prompt
      description: Question or instruction for the image.
      required: true
      example: Describe anything unusual in this camera image.
      selector:
        text:
          multiline: true
    image_file:
      name: Image File
      description: Choose an image from Home Assistant media. Leave empty when using a camera target.
      required: false
      selector:
        media:
          accept:
            - image/*
    image_path:
      name: Local Image Path
      description: Advanced local image path. The path must be allowed in Home Assistant's allowlist_external_dirs. Leave empty when using a camera target or media image.
      required: false
      advanced: true
      example: /config/www/snapshot.jpg
      selector:
        text:
    image_url:
      name: Image URL
      description: Advanced public or data URL for the image. Leave empty when using a camera target or local image.
      required: false
      advanced: true
      example: https://example.com/snapshot.jpg
      selector:
        text:
          type: url
    model:
      name: Model
      description: Optional Groq vision model override. Choose a known compatible model from the dropdown, or enter a newer Groq vision model ID manually if Groq adds one before this integration is updated. Leave empty to use the selected service model.
      required: false
      selector:
        select:
          custom_value: true
          options:
            - label: Llama 4 Scout 17B
              value: meta-llama/llama-4-scout-17b-16e-instruct
            - label: Llama 4 Maverick 17B
              value: meta-llama/llama-4-maverick-17b-128e-instruct

