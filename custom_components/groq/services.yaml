generate_text:
  name: Generate Text
  description: Generate a text response with a configured Groq Text Generation service.
  fields:
    config_entry_id:
      name: Groq Account
      description: Groq account to use. Leave empty when only one Groq account is configured.
      required: false
      selector:
        config_entry:
          integration: groq
    service_id:
      name: Groq Service
      description: Text Generation service name or ID from the Groq integration page. This is user-defined, so it cannot be shown as a fixed dropdown. Leave empty when the account has only one Text Generation service.
      required: false
      example: Text Generation
      selector:
        text:
    prompt:
      name: Prompt
      description: User prompt to send to Groq.
      required: true
      example: Summarize the current home status for a notification.
      selector:
        text:
          multiline: true
    model:
      name: Model
      description: Optional Groq chat model override. Choose a known compatible model from the dropdown, or enter a newer Groq model ID manually if Groq adds one before this integration is updated. Leave empty to use the selected service model.
      required: false
      selector:
        select:
          custom_value: true
          options:
            - label: OpenAI GPT-OSS 20B
              value: openai/gpt-oss-20b
            - label: OpenAI GPT-OSS 120B
              value: openai/gpt-oss-120b
            - label: OpenAI GPT-OSS Safeguard 20B
              value: openai/gpt-oss-safeguard-20b
            - label: Llama 4 Scout 17B
              value: meta-llama/llama-4-scout-17b-16e-instruct
            - label: Llama 3.1 8B Instant
              value: llama-3.1-8b-instant
            - label: Llama 3.3 70B Versatile
              value: llama-3.3-70b-versatile
            - label: Qwen 3 32B
              value: qwen/qwen3-32b
            - label: Groq Compound
              value: groq/compound
            - label: Groq Compound Mini
              value: groq/compound-mini
    system_prompt:
      name: System Prompt
      description: Optional system instructions. Leave empty to use the selected service prompt.
      required: false
      selector:
        text:
          multiline: true
    temperature:
      name: Temperature
      description: Controls response variation. Lower values are more predictable; higher values are more creative.
      required: false
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
          mode: slider
    max_tokens:
      name: Max Completion Tokens
      description: Maximum number of tokens Groq may generate.
      required: false
      advanced: true
      selector:
        number:
          min: 1
          mode: box
    top_p:
      name: Top P
      description: Alternative sampling control that limits generation to likely tokens.
      required: false
      advanced: true
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: box
    stop:
      name: Stop Sequences
      description: Stop sequence that ends generation. In YAML automations this also accepts a list of stop sequences.
      required: false
      advanced: true
      selector:
        text:
          multiline: true
    seed:
      name: Seed
      description: Best-effort deterministic sampling seed for repeatable responses.
      required: false
      advanced: true
      selector:
        number:
          min: 0
          mode: box
    service_tier:
      name: Service Tier
      description: Optional Groq processing tier for this request.
      required: false
      advanced: true
      selector:
        select:
          options:
            - label: Auto
              value: auto
            - label: On Demand
              value: on_demand
            - label: Flex
              value: flex
            - label: Performance
              value: performance
    reasoning_effort:
      name: Reasoning Effort
      description: Reasoning budget for models that support reasoning.
      required: false
      advanced: true
      selector:
        select:
          options:
            - label: Default
              value: default
            - label: None
              value: none
            - label: Low
              value: low
            - label: Medium
              value: medium
            - label: High
              value: high
    reasoning_format:
      name: Reasoning Format
      description: How supported reasoning models expose reasoning content.
      required: false
      advanced: true
      selector:
        select:
          options:
            - label: Hidden
              value: hidden
            - label: Raw
              value: raw
            - label: Parsed
              value: parsed
    include_reasoning:
      name: Include Reasoning
      description: Include reasoning content when the selected model supports it.
      required: false
      advanced: true
      selector:
        boolean:
    request_body_options:
      name: Additional Request Body Options
      description: Free-form Groq chat-create request options not exposed above, such as metadata, tools, tool_choice, parallel_tool_calls, or citation_options. This is an object because Groq accepts nested option data.
      required: false
      advanced: true
      selector:
        object:
    schema:
      name: JSON Schema
      description: Optional JSON Schema object for structured output. Only use with models that support structured outputs.
      required: false
      advanced: true
      selector:
        object:
    schema_name:
      name: Schema Name
      description: Name sent to Groq with the JSON schema. Use letters, numbers, underscores, or hyphens.
      required: false
      advanced: true
      example: response
      selector:
        text:
    strict:
      name: Strict Schema Mode
      description: Use Groq constrained decoding when the selected model supports strict structured outputs.
      required: false
      advanced: true
      selector:
        boolean:

generate_structured:
  name: Generate Structured Output
  description: Generate JSON that follows a supplied schema with a supported Groq Text Generation service.
  fields:
    config_entry_id:
      name: Groq Account
      description: Groq account to use. Leave empty when only one Groq account is configured.
      required: false
      selector:
        config_entry:
          integration: groq
    service_id:
      name: Groq Service
      description: Text Generation service name or ID from the Groq integration page. This is user-defined, so it cannot be shown as a fixed dropdown. Leave empty when the account has only one Text Generation service.
      required: false
      example: Text Generation
      selector:
        text:
    prompt:
      name: Prompt
      description: User prompt describing the data to generate.
      required: true
      example: Extract the room, device, and action from "turn off the kitchen lights".
      selector:
        text:
          multiline: true
    schema:
      name: JSON Schema
      description: JSON Schema object that Groq should follow. This is free-form because every structured output task needs its own schema.
      required: true
      example: '{"type":"object","properties":{"summary":{"type":"string"}},"required":["summary"],"additionalProperties":false}'
      selector:
        object:
    schema_name:
      name: Schema Name
      description: Name sent to Groq with the JSON schema. Use letters, numbers, underscores, or hyphens.
      required: false
      example: response
      selector:
        text:
    strict:
      name: Strict Schema Mode
      description: Use Groq constrained decoding when the selected model supports strict structured outputs.
      required: false
      default: false
      selector:
        boolean:
    model:
      name: Model
