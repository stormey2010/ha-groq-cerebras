clear_cache:
  name: Clear Cache
  description: Clear cached Groq text generation responses for a Groq account.
  fields:
    config_entry_id:
      name: Groq Account
      description: Groq account cache to clear. Leave empty when only one Groq account is configured.
      required: false
      selector:
        config_entry:
          integration: groq

list_models:
  name: List Models
  description: List Groq models available to a Groq account.
  fields:
    config_entry_id:
      name: Groq Account
      description: Groq account to inspect. Leave empty when only one Groq account is configured.
      required: false
      selector:
        config_entry:
          integration: groq
    refresh:
      name: Refresh From Groq
      description: Query Groq before returning the model list.
      required: false
      default: false
      selector:
        boolean:
