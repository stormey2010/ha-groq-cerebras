name: Bug report
description: Report a problem with the Groq and Cerebras Home Assistant integration.
title: "[Bug]: "
labels: ["bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include Groq or Cerebras API keys, full unredacted prompts, or private audio/image content.
  - type: dropdown
    id: primary_area
    attributes:
      label: Primary affected area
      options:
        - Account setup, API key, reauthentication
        - Service subentries and configuration
        - Text generation, Assist, or AI Task
        - Image analysis or vision actions
        - Speech-to-text transcription
        - Text-to-speech or voice selection
        - Groq or Cerebras API, model access, or rate limits
        - Audio processing or ffmpeg normalization
        - Diagnostics or repair issues
        - Documentation
        - Developer workflow / repository tooling
        - Other / unsure
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual install in custom_components
        - Development checkout
        - Other
    validations:
      required: true
  - type: input
    id: homeassistant_version
    attributes:
      label: Home Assistant version
      description: "Example: 2026.3.0"
      placeholder: "2026.3.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Groq and Cerebras integration version
      description: Use the HACS version, release tag, or manifest version.
      placeholder: "1.0"
    validations:
      required: true
  - type: textarea
    id: affected_service
    attributes:
      label: Affected service, entity, model, or action
      description: Include service name, entity ID, action name, model, voice, and relevant options.
      placeholder: "Example: groq.generate_text using service \"Planner\" with model llama-3.3-70b-versatile"
    validations:
      required: false
  - type: dropdown
    id: diagnostics_status
    attributes:
      label: Diagnostics attached?
      options:
        - Yes, config-entry diagnostics attached
        - Not yet, but I can upload them
        - I cannot capture diagnostics
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the expected behavior, actual behavior, and when it started.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or tracebacks
      description: Paste redacted Home Assistant logs, repair issue text, or service call errors.
      render: text
    validations:
      required: false
